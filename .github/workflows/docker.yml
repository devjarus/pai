name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: pai
            context: "."
            dockerfile: Dockerfile
            image_suffix: ""
          - service: sandbox
            context: "."
            dockerfile: sandbox/Dockerfile
            image_suffix: "-sandbox"
          - service: searxng
            context: "."
            dockerfile: searxng/Dockerfile
            image_suffix: "-searxng"

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY_GHCR }}/${{ github.repository }}${{ matrix.image_suffix }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Manual release tag (e.g. v0.3.0)
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            MINOR=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+')
            TAGS="${IMAGE}:${VERSION},${IMAGE}:${MINOR},${IMAGE}:latest"
          else
            # Main branch push — just latest + SHA
            TAGS="${IMAGE}:latest,${IMAGE}:main-${SHA}"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Tags: $TAGS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
