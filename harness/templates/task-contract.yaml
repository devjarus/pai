id: example-digest-fix
title: Improve a scoped behavior without widening risk
owner_block: digests
problem: >
  Describe the concrete failure, confusion, or weak metric.
target_change: >
  Describe the smallest useful improvement.
guardrails:
  - trust does not regress
  - reliability does not regress
validation:
  - pnpm verify
notes: >
  Use this only for larger, riskier, or multi-step tasks. Skip it for small obvious changes.
